name: Link Vault Digest

on:
  schedule:
    - cron: "0 14 * * 3" # Every Wednesday at 2pm UTC (7am PT / 10am ET)
  workflow_dispatch: {} # Manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate link vault digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTFARM_SUPABASE_URL: ${{ secrets.ANTFARM_SUPABASE_URL }}
          ANTFARM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ANTFARM_SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/generate-link-digest.ts

      - name: Check for new digests
        id: check
        run: |
          if git diff --quiet content/digests/ 2>/dev/null && [ -z "$(git ls-files --others --exclude-standard content/digests/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/digests/
          git commit -m "digest: auto-generate link vault digest"
          git push
